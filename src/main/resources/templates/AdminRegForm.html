<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.com">

<head>
    <title>Admin Reistration</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
    <style>
        #adminForm{
            max-height: 100%;
            max-width: 700px;
            margin-top: 3%;
            margin-inline-start: 25%;
            border-radius: 15px;
        }
        form:hover
        {
            box-shadow: 0 5 7px rgb(80, 79, 79);
        }
    </style>
</head>

<body>
    <div id="adminForm">
        <form action="addAdmin" method="post">
            <fieldset>
			<h5 class="text-danger text-center" th:if="${message}" th:text="${message}"></h5>
                <legend>Admin Registration Form</legend>
                <div class="row">
                    <div class="col p-2">
                        <input type="text" class="form-control" placeholder="First Name" name="firstName" required>
                    </div>
                    <div class="col p-2 ml-2">
                        <input type="text" class="form-control" placeholder="Last Name" name="lastName">
                    </div>
                </div>

                <div class="row">
                    <div class="col p-2" style="text-align: center;">
                        Gender
                    </div>
                    <div class="col p-2" style="text-align: center;">
                        <input type="radio" name="gender" value="Male" class="ml-5">Male
                        <input type="radio" name="gender" id="" value="Female" class="ml-5">Female
                    </div>
                </div>

                <div class="row">
                    <div class="col p-2 ml-2">
                        <label for="" style="text-align: center;">DOB</label>
                        <input type="date" class="form-control" name="dob" style="text-align: center;" placeholder="DOB">
                    </div>
                    <div class="col p-2">
                        <input type="number" class="form-control" placeholder="Enter Number" name="number" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col p-2 mt-4">
                        <input type="email" class="form-control" id="email" placeholder="Enter email" name="email"
                            required>
                    </div>
                </div>

                <div class="row">
                    <div class="col p-2">
                        <textarea id="" cols="20" rows="2" class="form-control" name="address"
                            placeholder="Address"></textarea>
                    </div>
                </div>

                <div class="row">
                    <div class="col p-2" style="text-align: center;">
                        Joining Date
                    </div>
                    <div class="col p-2">
                        <input type="date" class="form-control" name="joiningDate">
                    </div>
                </div>
                
                <div class="row">
                    <div class="col p-2" style="text-align: center;">
                        Designation
                    </div>
                    <div class="col p-2" style="text-align: center;">
                        <input type="radio" name="destignation" value="Tester" class="ml-5">Tester
                        <input type="radio" name="destignation" id="" value="Developer" class="ml-5">Developer
                        <input type="radio" name="destignation" id="" value="Admin" class="ml-5">Admin
                        <input type="radio" name="destignation" id="" value="Manager" class="ml-5">Manager
                        <input type="radio" name="destignation" id="" value="HR" class="ml-5">HR
                    </div>
                </div>

                <div class="row">
                    <div class="col p-2">
                        <input type="submit" class="form-control" value="Register">
                    </div>
                    <div class="col p-2">
                        <input type="reset" class="form-control" value="Reset">
                    </div>
                </div>
            </fieldset>
        </form>
    </div>
</body>

</html>
