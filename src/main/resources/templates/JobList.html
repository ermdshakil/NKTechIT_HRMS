<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.com">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hospital List</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style type="text/css">
body {
	background: url('/bg1.jpg') no-repeat center/cover black;
	height: 100vh;
	position: relative;
	opacity: 0.9;
	color: white;
}

.container-fluid {
	background: black;
	opacity: 0.8;
}

#logo {
	height: 50px;
	width: 50px
}
</style>
</head>
<body>

	<div class="container-fluid">
		<table class="table table-hover my-5">
			<thead class="table-primary my-3">
				<tr>
					<th scope="col">Job Id</th>
					<th scope="col">Job Title</th>
					<th scope="col">Department</th>
					<th scope="col">Location</th>	
					<th scope="col">Required Experience</th>	
					<th scope="col">Job Description</th>
					<th scope="col">Required Skills</th>			
					<th scope="col">Posted Date</th>
					<th scope="col">Posted By</th>
					<th scope="col">Status</th>
				</tr>
			</thead>
			<tbody class="table-dark table-group-divider">
				<tr th:each="list:${jobs}">
					<td th:text="${list.id}"></td>
					<td th:text="${list.title}"></td>
					<td th:text="${list.department}"></td>
					<td th:text="${list.location}"></td>	
					<td th:text="${list.ExpRequired}"></td>	
					<td th:text="${list.jobDescription}"></td>	
					<td th:text="${list.Skill}"></td>			
					<td th:text="${list.postDate}"></td>
					<td th:text="${list.postedBy}"></td>
					<td th:text="${list.status}"></td>					
				</tr>
			</tbody>
		</table>
	</div>
</body>
</html>
