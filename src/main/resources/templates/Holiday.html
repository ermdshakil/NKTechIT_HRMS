<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Indian Holidays Calendar - 2025</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <style>
    
    body {
      background: linear-gradient(to right, #f8f9fa, #e3f2fd);
      font-family: 'Segoe UI', sans-serif;
    }
    .month-section {
      margin-bottom: 3rem;
      padding: 1rem;
      border: 3px solid #90caf9;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      background-color: #ffffffdd;
    }
    .month-section:hover {
      transform: scale(1.01);
      box-shadow: 0 10px 30px rgba(33, 150, 243, 0.4);
    }
    .month-title {
      font-size: 1.7rem;
      margin-bottom: 1rem;
      text-align: center;
      font-weight: bold;
      color: #1565c0;
    }
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.5rem;
    }
    .day {
      background: #fff;
      border-radius: 10px;
      padding: 0.5rem;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      min-height: 80px;
      position: relative;
      cursor: default;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .day:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      z-index: 2;
    }
    .holiday {
      background-color: rgb(255, 179, 191) !important;
      font-weight: bold;
    }
    .sunday {
      background-color: rgb(151, 234, 151)  !important;
    }
    .weekday-header {
      text-align: center;
      font-weight: bold;
      padding: 0.5rem;
      background-color: rgb(153, 208, 237);
      border-radius: 5px;
    }
  </style>
</head>
<body>

<div class="container py-5">
  <h2 class="text-center animate__animated animate__fadeInDown">🇮🇳 Indian Holidays Calendar - 2025</h2>
  <div id="calendarContainer"></div>
</div>
<script src="/Holiday.js"></script>
</body>
</html>
