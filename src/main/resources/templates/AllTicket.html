<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Tickets - HRMS Portal</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Animate.css -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
body {
	background-color: #f0f2f5;
	font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.ticket-card {
	border-radius: 15px;
	box-shadow: 0 6px 10px rgba(0, 0, 0, 0.1);
	transition: transform 0.3s, box-shadow 0.3s;
}

.ticket-card:hover {
	transform: translateY(-10px);
	box-shadow: 0 12px 20px rgba(0, 0, 0, 0.2);
}

.ticket-status {
	font-size: 0.9rem;
	font-weight: bold;
	padding: 5px 10px;
	border-radius: 20px;
	display: inline-block;
	margin-top: 10px;
}

.status-open {
	background-color: #ffc107;
	color: #fff;
}

.status-inprogress {
	background-color: #17a2b8;
	color: #fff;
}

.status-closed {
	background-color: #28a745;
	color: #fff;
}
</style>
</head>

<body>

<div class="container py-5">
	<h1 class="text-center mb-5 animate__animated animate__fadeInDown">Employee Tickets</h1>

	<div class="row g-4">
		<div class="col-md-6 col-lg-4 mb-3" th:each="ticket : ${tickets}">
			<div class="card ticket-card p-3 animate__animated animate__fadeInUp">
				<h5 class="card-title" th:text="${ticket.issueType}">Issue Type</h5>
				<p class="card-text" th:text="${ticket.description}">Description</p>
				<span class="ticket-status status-closed" th:text="${ticket.status}">Status</span>
				<p class="mt-3 mb-0"><strong>Ticket ID:</strong> <span th:text="${ticket.ticketId}"></span></p>
				<p class="mt-2 mb-0"><strong>Ticket Raised Date:</strong> <span th:text="${ticket.createdAt}"></span></p>

				<div class="d-grid gap-2 col-8 mx-auto mt-3">
					<button type="button" class="btn btn-outline-primary btn-md" data-bs-toggle="modal" 
					        th:attr="data-bs-target='#ticketModal__' + ${ticket.ticketId}">
						View More Details
					</button>
				</div>
			</div>

			<div class="modal fade" th:id="'ticketModal__' + ${ticket.ticketId}" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
				<div class="modal-dialog modal-lg">
					<div class="modal-content">
						<div class="modal-header">
							<h5 class="modal-title" id="modalLabel">Ticket Details</h5>
							<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
						</div>
						<div class="modal-body">
							<div class="card p-3">
								<h5 class="card-title" th:text="${ticket.issueType}">Issue Type</h5>
								<p class="card-text" th:text="${ticket.description}">Description</p>
								<span class="ticket-status status-closed" th:text="${ticket.status}">Status</span>
								<p class="mt-2 mb-0"><strong>Ticket ID:</strong> <span th:text="${ticket.ticketId}"></span></p>
								<p class="mt-2 mb-0"><strong>Department: </strong> <span th:text="${ticket.department}"></span></p>
								<p class="mt-2 mb-0"><strong>Ticked Type Code:</strong> <span th:text="${ticket.typeCode}"></span></p>
								<p class="mt-2 mb-0"><strong>Ticket Raised Date:</strong> <span th:text="${ticket.createdAt}"></span></p>
								<p class="mt-2 mb-0"><strong>Employee Id:</strong> <span th:text="${ticket.empId}"></span></p>
								<p class="mt-2 mb-0"><strong>Username:</strong> <span th:text="${ticket.username}"></span></p>
								<p class="mt-2 mb-0"><strong>Employee Name:</strong> <span th:text="${ticket.name}"></span></p>
								<p class="mt-2 mb-0"><strong>Email Id:</strong> <span th:text="${ticket.email}"></span></p>
								<p class="mt-2 mb-0"><strong>Ticket Updated Date:</strong> <span th:text="${ticket.updateAt}"></span></p>
								<p class="mt-2 mb-0"><strong>Updated By:</strong> <span th:text="${ticket.updateBy}"></span></p>
							</div>
						</div>
						<div class="modal-footer">
							<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
						</div>
					</div>
				</div>
			</div> 
		</div> 
	</div> 
</div>

<!-- Bootstrap Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
