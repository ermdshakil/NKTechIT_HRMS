<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.com">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password</title>
<link rel="stylesheet"
	href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
<style>
body {
	padding: 20px;
}
</style>
</head>
<body>
	<div class="container-fluid">
		<form th:if="${employee}" th:action="@{updateEmpPass}" method="post"
			th:object="${employee}">
			<div class="mb-3">
				<label>Employee Id:</label> 
				<input type="number" class="form-control" th:field="*{id}" readonly>
			</div>

			<div class="mb-3">
				<label>Username:</label> <input type="text" class="form-control"
					th:field="*{username}" readonly>
			</div>

			<div class="mb-3">
				<label>Old Password</label>
				<textarea class="form-control" th:text="${employee.newPass}" readonly></textarea>
			</div>

			<div class="mb-3">
				<label>New Password</label>
				<textarea class="form-control" th:field="*{newPass}"></textarea>
			</div>

			<div class="mb-3">
				<label>Enter Password Again:</label>
				<textarea class="form-control" th:text="${employee.newPass}"></textarea>
			</div>

			<button type="submit" class="btn btn-success">Update Password</button>
		</form>
	</div>
</body>
</html>
