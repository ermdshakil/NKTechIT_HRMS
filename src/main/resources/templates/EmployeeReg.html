<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.com">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Registration</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css">
    <style>
        body {
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        body.loaded {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow-lg p-4">
                <h5 class="text-danger text-center" th:if="${message}" th:text="${message}"></h5>
                    <h2 class="text-center text-primary">Employee Registration</h2>
                    <h4 class="text-primary mt-3"><u>Personal Details</u></h4>

                    <form action="addEmp" method="post" id="registrationForm">
                        <div class="mb-3">
                            <label class="form-label">First Name:</label>
                            <input type="text" class="form-control" name="firstName" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Last Name:</label>
                            <input type="text" class="form-control" name="lastName" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Date of Birth:</label>
                            <input type="date" class="form-control" name="dob" value="2001-01-01" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Gender:</label>
                            <div class="form-check form-check-inline">
                                <input type="radio" class="form-check-input" name="gender" value="Male">
                                <label class="form-check-label">Male</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input type="radio" class="form-check-input" name="gender" value="Female">
                                <label class="form-check-label">Female</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Select Department:</label>
                            <select class="form-select" name="department">
                                <option value="">Select Department</option>
                                <option value="Developer">Developer</option>
                                <option value="Tester">Tester</option>
                                <option value="HR">HR</option>
                                <option value="Manager">Manager</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Company Location:</label>
                            <select class="form-select" name="location">
                                <option value="">Select Location</option>
                                <option value="Hyderabad">Hyderabad</option>
                                <option value="Bangalore">Bangalore</option>
                                <option value="Pune">Pune</option>
                                <option value="Gurugram">Gurugram</option>
                                <option value="Chennai">Chennai</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Joining Date:</label>
                            <input type="date" class="form-control" name="joiningDate" value="2023-03-01">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Blood Group:</label>
                            <input type="text" class="form-control" name="blood">
                        </div>

                        <h4 class="text-primary mt-3"><u>Contact Details</u></h4>

                        <div class="mb-3">
                            <label class="form-label">Email:</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Primary Number:</label>
                            <input type="tel" class="form-control" name="primaryNum" id="number" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Secondary Number:</label>
                            <input type="tel" class="form-control" name="secondryNum">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Current Address:</label>
                            <textarea class="form-control" rows="2" name="contactAdd"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Permanent Address:</label>
                            <textarea class="form-control" rows="2" name="permanentAdd"></textarea>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Register</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            document.body.classList.add("loaded");
        });

    </script>
</body>
</html>
