<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Department Stats</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style type="text/css">
body {
	background: url('/bg1.jpg') no-repeat center/cover black;
	height: 100vh;
	position: relative;
	opacity: 0.9;
	color: white;
}
.container-fluid {
	background: black;
	opacity: 0.8;
}
</style>
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center">Employees Per Department</h2>
        <table class="table table-hover my-3">
            <thead class="table-primary my-3">
                <tr>
                    <th scope="col">Department</th>
                    <th scope="col">Total Employees</th>
                </tr>
            </thead>
            <tbody class="table-dark table-group-divider">
			    <tr th:each="stat : ${deptStats}">
			        <td th:text="${stat.department}">Department</td>
			        <td th:text="${stat.totalEmployees}">0</td>
			    </tr>
			</tbody>
        </table>
    </div>
</body>
</html>
