<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leave Application Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      background: linear-gradient(to right, #eef2f3, #8e9eab);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .leave-summary {
      margin-top: 30px;
    }

    .card {
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      animation: fadeInUp 1s ease-in-out;
    }

    .form-container {
      margin-top: 40px;
      margin-bottom: 50px;
    }

    .btn-primary {
      transition: transform 0.2s ease;
    }

    .btn-primary:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(40px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card.form-card {
      animation: fadeInUp 1.2s ease-in-out;
    }

    h4 {
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container" th:if="${leave}">

  <!-- Leave Summary -->
  <div class="row text-center leave-summary">
    <div class="col-md-6 mb-3">
      <div class="card text-white bg-primary">
        <div class="card-body">
          <h5 class="card-title">Total Leave</h5>
          <p class="card-text fs-4">26 Days</p>
        </div>
      </div>
    </div>
    <div class="col-md-6 mb-3">
      <div class="card text-white bg-success">
        <div class="card-body">
          <h5 class="card-title">Taken Leave</h5>
          <p class="card-text" th:text="${leave.leaveDay + ' Days'}">0 Days</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Leave Form -->
  <div class="row justify-content-center form-container">
    <div class="col-md-8">
      <div class="card p-4 form-card">
        <h4 class="mb-4 text-center">Leave Application Form</h4>
         <h5 class="text-success text-center" th:if="${message}" th:text="${message}"></h5>
        <form method="post" th:action="@{apply-leave}" th:object="${leave}">
          <div class="mb-3">
            <label for="id" class="form-label">Employee ID</label>
            <input type="text" id="id" class="form-control" th:field="*{id}" readonly>
          </div>
          <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" id="name" class="form-control" th:field="*{name}" readonly>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email ID</label>
            <input type="email" id="email" class="form-control" th:field="*{email}" readonly>
          </div>
          <div class="mb-3">
            <label for="leaveFrom" class="form-label">Leave From</label>
            <input type="date" id="leaveFrom" class="form-control" th:field="*{leaveFrom}" required>
          </div>
          <div class="mb-3">
            <label for="leaveTo" class="form-label">Leave To</label>
            <input type="date" id="leaveTo" class="form-control" th:field="*{leaveTo}" required>
          </div>
          <div class="mb-3">
            <label for="reason" class="form-label">Reason</label>
            <textarea id="reason" class="form-control" rows="4" th:field="*{reason}" placeholder="State your reason for leave..." required></textarea>
          </div>
          <div class="text-center">
            <button type="submit" class="btn btn-primary px-4">Apply Leave</button>
          </div>
        </form>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
