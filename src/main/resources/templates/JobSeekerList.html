<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.com">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Job Seeker List</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
body {
	background: url('/bg1.jpg') no-repeat center/cover;
	height: 100vh;
	margin: 0;
	color: white;
}

.container-fluid {
	background: rgba(0, 0, 0, 0.9);
	color: white;
}

.modal-content {
	background-color: #ffffff !important;
	color: #000000 !important;
}

.modal-backdrop.show {
	opacity: 0.5;
}
</style>

</head>
<body>

	<div class="container-fluid">
		<h1 class="container text-center">Job Seeker List</h1>
		<table class="table table-hover my-5">
			<thead class="table-primary my-3">
				<tr>
					<th>Sr. Number</th>
					<th>Job Id</th>
					<th>Employee Id</th>
					<th>Employee Name</th>
					<th>Email</th>
					<th>Emp Mobile No</th>
					<th>Department</th>
					<th>Gender</th>
					<th>Actions</th>
				</tr>
			</thead>
			<tbody class="table-dark table-group-divider">
				<tr th:each="list : ${jobSeeker}">
					<td th:text="${list.srNo}"></td>
					<td th:text="${list.jobId}"></td>
					<td th:text="${list.empId}"></td>
					<td th:text="${list.empName}"></td>
					<td th:text="${list.email}"></td>
					<td th:text="${list.number}"></td>
					<td th:text="${list.department}"></td>
					<td th:text="${list.gender}"></td>
					<td>
						<button type="button"
							class="btn btn-outline-info d-grid col-12 mx-auto"
							data-bs-toggle="modal"
							th:attr="data-bs-target='#modal__' + ${list.srNo}">View
							More Details</button>


					</td>
				</tr>
			</tbody>
		</table>


		<div th:each="list : ${jobSeeker}" class="modal fade"
			th:id="'modal__' + ${list.srNo}" tabindex="-1"
			aria-labelledby="modalLabel" aria-hidden="true">

			<div class="modal-dialog modal-lg">
				<div class="modal-content">
					<div class="modal-header">
						<h1 class="modal-title fs-5 text-center" id="modalLabel">Job
							Details</h1>
						<button type="button" class="btn-close" data-bs-dismiss="modal"
							aria-label="Close"></button>
					</div>

					<div class="modal-body">
						<form method="post" action="jobApply">
							<input type="hidden" name="jobId" th:value="${list.jobId}">
							<input type="hidden" name="empId" th:value="${list.empId}">
							<input type="hidden" name="status"
								th:id="'statusInput_' + ${list.jobId}" value="">

							<div class="form-floating mb-3">
								<input type="text" class="form-control"
									th:value="${list.empName}" readonly> <label>Name</label>
							</div>

							<div class="form-floating mb-3">
								<input type="email" class="form-control"
									th:value="${list.email}" readonly> <label>Email</label>
							</div>

							<div class="form-floating mb-3">
								<input type="text" class="form-control"
									th:value="${list.number}" readonly> <label>Mobile
									No</label>
							</div>

							<div class="form-floating mb-3">
								<input type="text" class="form-control"
									th:value="${list.department}" readonly> <label>Department</label>
							</div>

							<div class="form-floating mb-3">
								<input type="text" class="form-control"
									th:value="${list.gender}" readonly> <label>Gender</label>
							</div>

							<div class="form-floating mb-3" th:if="${list.career != null}">
								<input type="text" class="form-control"
									th:value="${list.career.title}" readonly> <label>Job
									Title</label>
							</div>

							<div class="form-floating mb-3" th:if="${list.career != null}">
								<input type="text" class="form-control"
									th:value="${list.career.location}" readonly> <label>Job
									Location</label>
							</div>

							<div class="form-floating mb-3" th:if="${list.career != null}">
								<input type="text" class="form-control"
									th:value="${list.career.ExpRequired}" readonly> <label>Experience
									Required</label>
							</div>

							<div class="form-floating mb-3" th:if="${list.career != null}">
								<input type="text" class="form-control"
									th:value="${list.career.Skill}" readonly> <label>Required
									Skills</label>
							</div>



							<div class="text-center">
								<button type="submit" class="btn btn-success"
									th:attr="onclick='this.form.status.value=\'shortlist\''">Shortlist</button>
								<button type="submit" class="btn btn-danger"
									th:attr="onclick='this.form.status.value=\'reject\''">Reject</button>
								<button type="button" class="btn btn-secondary"
									data-bs-dismiss="modal">Close</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
