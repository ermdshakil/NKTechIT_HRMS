<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Job - HRMS Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        body {
            background-color: #f4f6f8;
        }

        .job-form-container {
            max-width: 700px;
            margin: 60px auto;
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            animation: fadeIn 1s ease-in;
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
            animation: slideInDown 0.8s;
        }

        .form-label,
        .form-control,
        .form-select,
        textarea {
            animation: fadeInUp 1s ease-in-out;
        }

        .btn-primary {
            width: 100%;
            transition: all 0.3s ease-in-out;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            background-color: #0069d9;
        }

        /* Custom fade-in keyframe as fallback */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Animate individual fields with delay */
        .form-control,
        .form-select,
        textarea {
            animation: fadeInUp 0.6s ease-in-out;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="job-form-container animate__animated animate__fadeIn">
        <div class="form-header animate__animated animate__fadeInDown">
            <h2>Upload New Job</h2>
            <p>Enter the job details below</p>
        </div>

        <form action="upload-job" method="post">
            <div class="mb-3">
                <label for="jobTitle" class="form-label">Job Title</label>
                <input type="text" class="form-control" id="jobTitle" name="title" required>
            </div>

            <div class="mb-3">
                <label for="department" class="form-label">Department</label>
                <select class="form-select" id="department" name="department" required>
                    <option value="">Select Department</option>
                    <option value="HR">HR</option>
                    <option value="Software">Software</option>
                    <option value="Marketing">Marketing</option>
                    <option value="Sales">Sales</option>
                    <option value="Others">Others</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="location" class="form-label">Job Location</label>
                <input type="text" class="form-control" id="location" name="location" required>
            </div>

            <div class="mb-3">
                <label for="experience" class="form-label">Experience (Years)</label>
                <input type="number" class="form-control" id="experience" name="ExpRequired" min="0" required>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Job Description</label>
                <textarea class="form-control" id="description" name="jobDescription" rows="4" required></textarea>
            </div>

            <div class="mb-3">
                <label for="skills" class="form-label">Required Skills</label>
                <input type="text" class="form-control" id="skills" name="Skill" placeholder="e.g. Java, SQL, Communication">
            </div>

            <button type="submit" class="btn btn-primary animate__animated animate__pulse">Post Job</button>
        </form>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
