<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee leaves - HRMS Portal</title>

<!-- Bootstrap CSS -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<!-- Animate.css -->
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

<style>
body {
	background-color: #f0f2f5;
	font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.leave-card {
	border-radius: 15px;
	box-shadow: 0 6px 10px rgba(0, 0, 0, 0.1);
	transition: transform 0.3s, box-shadow 0.3s;
}

.leave-card:hover {
	transform: translateY(-10px);
	box-shadow: 0 12px 20px rgba(0, 0, 0, 0.2);
}

.leave-status {
	font-size: 0.9rem;
	font-weight: bold;
	padding: 5px 10px;
	border-radius: 20px;
	display: inline-block;
	margin-top: 10px;
}

.status-open {
	background-color: #ffc107;
	color: #fff;
}

.status-inprogress {
	background-color: #17a2b8;
	color: #fff;
}

.status-closed {
	background-color: #28a745;
	color: #fff;
}

.action-btn {
	transition: all 0.3s ease;
}

.action-btn:hover {
	transform: scale(1.05);
	opacity: 0.9;
	box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
}
</style>
</head>

<body>

	<div class="container py-5">
		<h1 class="text-center mb-5 animate__animated animate__fadeInDown">Employee
			leaves</h1>

		<div class="row g-4">
			<div class="col-md-6 col-lg-4 mb-3" th:each="leave : ${leaves}">
				<div class="card leave-card p-3 animate__animated animate__fadeInUp">
					<h5 class="card-title" th:text="'Leave Id: ' + ${leave.id}">Leave
						Id</h5>
					<p class="card-text" th:text="'Employee Name: ' + ${leave.name}">Employee
						Name</p>
					<p>
						<strong>Email:</strong> <span th:text="${leave.email}">email@example.com</span>
					</p>
					
					<p>
						<strong>Reason: </strong> <span th:text="${leave.reason}">Reason</span>
					</p>

					<span class="leave-status" th:text="${leave.status}"
						th:classappend="${leave.status == 'Pending'} ? ' status-open' : (${leave.status == 'InProgress'} ? ' status-inprogress' : ' status-closed')">
						Status </span>

					<div class="d-grid gap-2 col-8 mx-auto mt-3">
						<button type="button" class="btn btn-outline-primary btn-md"
							th:attr="data-bs-target='#leaveModal__' + ${leave.id}"
							data-bs-toggle="modal">View More Details</button>

					</div>
				</div>

				<!-- Modal -->
				<div class="modal fade" th:attr="id='leaveModal__' + ${leave.id}"
					tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
					<div class="modal-dialog modal-lg">
						<div class="modal-content">
							<div class="modal-header">
								<h1 class="modal-title fs-5" id="modalLabel">Leave Details</h1>
								<button type="button" class="btn-close" data-bs-dismiss="modal"
									aria-label="Close"></button>
							</div>

							<div class="modal-body">
								<form method="post" action="updateLeave">
									<div class="form-floating mb-3">
										<input type="number" class="form-control" name="id"
											th:value="${leave.id}" readonly> <label>Leave
											Id</label>
									</div>

									<div class="form-floating mb-3">
										<input type="text" class="form-control" name="name"
											th:value="${leave.name}" readonly> <label>Employee
											Name</label>
									</div>

									<div class="form-floating mb-3">
										<input type="email" class="form-control" name="email"
											th:value="${leave.email}" readonly> <label>Email</label>
									</div>

									<div class="form-floating mb-3">
										<input type="date" class="form-control" name="leaveFrom"
											th:value="${leave.leaveFrom}" readonly> <label>Leave
											From</label>
									</div>

									<div class="form-floating mb-3">
										<input type="date" class="form-control" name="leaveTo"
											th:value="${leave.leaveTo}" readonly> <label>Leave
											To</label>
									</div>

									<div class="form-floating mb-3">
										<input type="text" class="form-control" name="reason"
											th:value="${leave.reason}"> <label>Reason</label>
									</div>

									<!-- Action buttons -->
									<div class="container-fluid text-center mb-3">
										<input type="hidden" name="status" id="statusInput" value="">

										<button type="submit"
											class="btn btn-success mx-2 px-4 action-btn"
											onclick="this.form.status.value='Approve'">Approve</button>

										<button type="submit"
											class="btn btn-danger mx-2 px-4 action-btn"
											onclick="this.form.status.value='Reject'">Reject</button>
							<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
									</div>
								</form>
							</div>
						</div>
					</div>
				</div>

				<!-- End of Modal -->
			</div>
			<!-- End of Column -->
		</div>
		<!-- End of Row -->
	</div>
	<!-- End of Container -->

	<!-- Bootstrap Bundle JS -->
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
