<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.com">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            background: linear-gradient(to right, #00c6ff, #0072ff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            animation: fadeIn 1.2s ease-in;
        }

        .login-card {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            animation: slideUp 0.8s ease-in-out;
        }

        .form-control {
            border-radius: 10px;
        }

        .toggle-password {
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 10px;
        }

        .toggle-password img {
            width: 22px;
            height: 22px;
        }

        .icon-img {
            width: 26px;
            height: 26px;
            margin-right: 8px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="login-card">
    	<h5 class="text-danger text-center" th:if="${message}" th:text="${message}"></h5>
        <h2 class="text-center mb-4">
            <img src="/icon5.png" alt="Admin Icon" class="icon-img" style="height: 60px; width: 60px;"/>
            Admin Login
        </h2>

        <form action="/admin/adminLogin" method="post">
            <div class="mb-3">
                <label for="adminEmail" class="form-label">Username</label>
                <input type="text" class="form-control" id="adminEmail" name="username" placeholder="Username"
                    required />
            </div>

            <div class="mb-3 position-relative">
                <label for="adminPassword" class="form-label">Password</label>
                <input type="password" class="form-control" id="adminPassword" name="password"
                    placeholder="Enter your password" required />
                <span class="toggle-password" onclick="togglePassword()">
                    <img src="/icon1.png" id="toggleIcon" alt="Show Password" />
                </span>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                    <img src="/icon4.png" alt="Login" class="icon-img" />
                    Login
                </button>
            </div>
        </form>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById("adminPassword");
            const toggleIcon = document.getElementById("toggleIcon");

            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                toggleIcon.src = "/icon2.png"; // Change to eye_hide
                toggleIcon.alt = "Hide Password";
            } else {
                passwordInput.type = "password";
                toggleIcon.src = "/icon1.png"; // Change to eye_show
                toggleIcon.alt = "Show Password";
            }
        }
    </script>

</body>

</html>
