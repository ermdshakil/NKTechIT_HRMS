<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Portal - NKTechIt</title>

<!-- Bootstrap CSS -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<!-- Animate.css -->
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

<style>
body {
	background-color: #f0f2f5;
	font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.job-card {
	border-radius: 15px;
	box-shadow: 0 6px 10px rgba(0, 0, 0, 0.1);
	transition: transform 0.3s, box-shadow 0.3s;
}

.job-card:hover {
	transform: translateY(-10px);
	box-shadow: 0 12px 20px rgba(0, 0, 0, 0.2);
}

.job-status {
	font-size: 0.9rem;
	font-weight: bold;
	padding: 5px 10px;
	border-radius: 20px;
	display: inline-block;
	margin-top: 10px;
}

.status-open {
	background-color: #ffc107;
	color: #fff;
}

.status-inprogress {
	background-color: #17a2b8;
	color: #fff;
}

.status-closed {
	background-color: #28a745;
	color: #fff;
}

.action-btn {
	transition: all 0.3s ease;
}

.action-btn:hover {
	transform: scale(1.05);
	opacity: 0.9;
	box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
}
</style>
</head>

<body>

	<div class="container py-5">
		<h1 class="text-center mb-5 animate__animated animate__fadeInDown">Job Portal</h1>
	 	<h5 class="text-danger text-center" th:if="${message}" th:text="${message}"></h5>	
		<div class="row g-4">
			<div class="col-md-6 col-lg-4 mb-3" th:each="job : ${jobs}">
				<div class="card job-card p-3 animate__animated animate__fadeInUp">
					<h5 class="card-title" th:text="${job.title}">Job Title</h5>
					<p><strong>Job Location: </strong> <span th:text="${job.location}"></span></p>
					<p><strong>Required Experience:</strong> <span th:text="${job.ExpRequired}">Required Experience</span></p>				
					<p><strong>Skill: </strong> <span th:text="${job.Skill}">Skill</span></p>
					<p><strong>Job Id </strong> <span th:text="${job.id}">Job Id</span></p>
					<div class="d-grid gap-2 col-8 mx-auto mt-3">
						<button type="button" class="btn btn-outline-primary btn-md"
							th:attr="data-bs-target='#jobModal__' + ${job.id}"
							data-bs-toggle="modal">View More Details</button>
					</div>
				</div>

				<!-- Modal -->
				<div class="modal fade" th:attr="id='jobModal__' + ${job.id}"
					tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
					<div class="modal-dialog modal-lg">
						<div class="modal-content">
							<div class="modal-header">
								<h1 class="modal-title fs-5" id="modalLabel">job Details</h1>
								<button type="button" class="btn-close" data-bs-dismiss="modal"
									aria-label="Close"></button>
							</div>

							<div class="modal-body">
								<form method="post" action="jobApply">
									<div class="form-floating mb-3">
										<input type="number" class="form-control" name="jobId"
											th:value="${job.id}" readonly> <label>job
											Id</label>
									</div>
									
									<div class="form-floating mb-3">
										<input type="text" class="form-control" name="title"
											th:value="${job.title}" readonly> <label>Job Number</label>
									</div>

									<div class="form-floating mb-3">
										<input type="text" class="form-control" name="title"
											th:value="${job.title}" readonly> <label>Job Title</label>
									</div>

									<div class="form-floating mb-3">
										<input type="text" class="form-control" name="department"
											th:value="${job.department}" readonly> <label>Department</label>
									</div>

									<div class="form-floating mb-3">
										<input type="text" class="form-control" name="location"
											th:value="${job.location}" readonly> <label>job
											Location</label>
									</div>

									<div class="form-floating mb-3">
										<input type="text" class="form-control" name="ExpRequired"
											th:value="${job.ExpRequired}" readonly> <label>Required Experience</label>
									</div>

									<div class="form-floating mb-3">
										<input type="text" class="form-control" name="jobDescription"
											th:value="${job.jobDescription}" readonly> <label>Job Description</label>
									</div>
									
									<div class="form-floating mb-3">
										<input type="text" class="form-control" name="Skill"
											th:value="${job.Skill}" readonly> <label>Required Skills</label>
									</div>

									<!-- Action buttons -->
									<div class="container-fluid text-center mb-3">
										<input type="hidden" name="status" id="statusInput" value="">

										<button type="submit" class="btn btn-success mx-2 px-4 action-btn"
											onclick="this.form.status.value='Apply'">Apply</button>
											
										<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
									</div>
								</form>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
