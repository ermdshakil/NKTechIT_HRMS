<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.com">
<head>
    <title>Employee Profile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">Employee Contact Information</h2>
    <table class="table table-bordered table-hover my-5" th:if="${employee}">
        <tr>
            <th>Email</th>
            <td th:text="${employee.email}"></td>
        </tr>
        <tr>
            <th>Primary Number</th>
            <td th:text="${employee.primaryNum}"></td>
        </tr>
        <tr>
            <th>Secondary Number</th>
            <td th:text="${employee.secondryNum}"></td>
        </tr>
        <tr>
            <th>Current Address</th>
            <td th:text="${employee.contactAdd}"></td>
        </tr>
        <tr>
            <th>Permanent Address</th>
            <td th:text="${employee.permanentAdd}"></td>
        </tr>
    </table>
</div>
</body>
</html>
