<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.com">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Check-In / Check-Out</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background: #fff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: transform 0.3s ease-in-out;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .btn-animated {
      padding: 12px 30px;
      font-size: 1.2rem;
      border: none;
      border-radius: 30px;
      transition: all 0.4s ease;
    }

    .btn-checkin {
      background-color: #28a745;
      color: white;
    }

    .btn-checkin:hover {
      background-color: #218838;
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 10px 15px rgba(40, 167, 69, 0.4);
    }

    .btn-checkout {
      background-color: #dc3545;
      color: white;
    }

    .btn-checkout:hover {
      background-color: #c82333;
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 10px 15px rgba(220, 53, 69, 0.4);
    }
    a{
        text-decoration: none;
        color: white;
    }
  </style>
</head>
<body>
  <div class="card">
     <h5 class="text-danger text-center" th:if="${message}" th:text="${message}"></h5>
    <h2 class="mb-4">Welcome</h2>
    <p class="mb-4">Please select an option below:</p>
    <div class="d-grid gap-3">
      <button class="btn btn-animated btn-checkin"><a href="checkIn">Check In</a></button>
      <button class="btn btn-animated btn-checkout"><a href="checkItOut">Check Out</a></button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
