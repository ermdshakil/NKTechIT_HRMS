<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.com">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Raise IT Ticket</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(to right, #667eea, #764ba2);
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      animation: fadeInUp 1s ease-out;
      box-shadow: 0 15px 25px rgba(0, 0, 0, 0.2);
      border-radius: 15px;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-label {
      font-weight: 500;
    }

    .btn-custom {
      background-color: #5f27cd;
      color: white;
      border: none;
    }

    .btn-custom:hover {
      background-color: #341f97;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card p-4">
          <h3 class="text-center mb-4 text-primary">Raise a Ticket to IT Team</h3>
          <form th:if="${employee}" th:action="@{ticket}" method="post"
			th:object="${employee}">
			<div class="mb-3">
				<label>Username:</label> 
				<input type="text" class="form-control" th:field="*{username}" readonly>
			</div>
            <div class="mb-3">
				<label>Name:</label> 
				<input type="text" class="form-control" th:value="*{firstName} + ' ' + *{lastName}" name="name" readonly>
			</div>
            <div class="mb-3">
              <label class="form-label">Email address</label>
              <input type="email" class="form-control" th:field="*{email}"  readonly />
            </div>
            <div class="mb-3">
              <label class="form-label">Department</label>
              <input type="text" class="form-control" value="IT" name="department" readonly />
            </div>
            <div class="mb-3">
              <label class="form-label">Issue Type</label>
              <select class="form-select" id="issueType" onchange="setTypeCode()" name="issueType" required>
                <option selected disabled>Select issue type</option>
                <option value="Software Issue">Software Issue</option>
                <option value="Hardware Issue">Hardware Issue</option>
                <option value="Network Problem">Network Problem</option>
                <option value="Access Request">Access Request</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Type Code</label>
              <input type="text" class="form-control" id="typeCode" name="typeCode" readonly />
            </div>
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea class="form-control" rows="4" placeholder="Describe your issue in detail..." name="description" required></textarea>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-custom btn-lg">Submit Ticket</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function setTypeCode() {
      const issueType = document.getElementById("issueType");
      const typeCode = document.getElementById("typeCode");
      const codeMap = {
    	'Software Issue': "SW001",
        'Hardware Issue': "HW001",
        'Network Problem': "NW001",
        'Access Request': "AR001",
        'Other': "OT001"
      };
      typeCode.value = codeMap[issueType.value] || "";
    }
  </script>
</body>
</html>
