<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin & Employee Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #8360c3, #2ebf91);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      border: none;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: fadeIn 1s ease;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
    }

    .option-btn {
      font-size: 1.2rem;
      padding: 15px 30px;
      border-radius: 50px;
      transition: all 0.3s ease;
    }

    .option-btn:hover {
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="container text-center">
    <div class="card p-5 bg-light">
      <h1 class="mb-4">Welcome to Portal 🚀</h1>
      <p class="lead mb-5">Choose your role to continue</p>
      
      <div class="d-flex justify-content-center gap-4 flex-wrap">
        <a href="/admin/login" class="btn btn-primary option-btn">
          👨‍💼 Admin Panel
        </a>
        <a href="/employee/empLogin" class="btn btn-success option-btn">
          👷 Employee Access
        </a>
      </div>
    </div>
  </div>

</body>
</html>
