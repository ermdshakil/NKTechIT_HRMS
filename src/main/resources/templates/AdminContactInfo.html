<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.com">
<head>
    <title>admin Profile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style type="text/css">
    a{
    text-decoration: none;
    color: black;
    }
    i{
    font-size: 24px;
    padding: 0px;   
    }
    </style>
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">Admin Contact Information</h2>
    <table class="table table-bordered table-hover my-5" th:if="${admin}">
        <tr>
            <th>Email</th>
            <td th:text="${admin.email}"></td>
        </tr>
        <tr>
            <th>Mobile Number</th>
            <td th:text="${admin.number}"></td>
        </tr>
        <tr>
            <th>Address</th>
            <td th:text="${admin.address}"></td>
        </tr>
    </table>
    <div class="d-grid gap-2 col-6 mx-auto">
		  <button class="btn btn-outline-info" type="button"><a href="home"><i class="bi bi-house-add-fill" ></i>&nbsp;  Home</a></button>
	</div>
</div>
</body>
</html>
