<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leave Application Summary</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      background: linear-gradient(to right, #e0eafc, #cfdef3);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .leave-summary {
      margin-top: 60px;
    }

    .card {
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      border-radius: 15px;
      animation: fadeInUp 1s ease-in-out;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .card-text {
      font-size: 1.8rem;
      font-weight: bold;
    }

    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

<div class="container" th:if="${leave}">
  <h2 class="text-center mt-5 mb-2">Leave Summary</h2>
  <div class="row justify-content-center leave-summary">
    <!-- Total Leave -->
    <div class="col-md-5 mb-3">
      <div class="card text-white bg-primary">
        <div class="card-body text-center">
          <h5 class="card-title">Total Leave</h5>
          <p class="card-text">26 Days</p>
        </div>
      </div>
    </div>

    <!-- Taken Leave -->
    <div class="col-md-5 mb-3">
      <div class="card text-white bg-success">
        <div class="card-body text-center">
          <h5 class="card-title">Taken Leave</h5>
          <p class="card-text" th:text="${leave.leaveDay + ' Days'}">0 Days</p>
        </div>
      </div>
    </div>
  </div>
  
  <div class="container mt-3">
    <h2 class="mb-4">Leave Details</h2>
    <table class="table table-bordered table-hover my-5">
        <tr>
            <th>ID</th>
            <td th:text="${leave.id}"></td>
        </tr>
        <tr>
            <th>Leave From: </th>
            <td th:text="${leave.leaveFrom}"></td>
        </tr>
        <tr>
            <th>Leave To</th>
            <td th:text="${leave.leaveTo}"></td>
        </tr>
        <tr>
            <th>Leave Reason</th>
            <td th:text="${leave.reason}"></td>
        </tr>
        <tr>
            <th>Total Leave</th>
            <td th:text="${leave.totalLeave}"></td>
        </tr>
        <tr>
            <th>Taken Leave</th>
            <td th:text="${leave.leaveDay}"></td>
        </tr>
        <tr>
            <th>Status</th>
            <td th:text="${leave.status}"></td>
        </tr>
        <tr>
            <th>Approved By:</th>
            <td th:text="${leave.appovedBy}"></td>
        </tr>
    </table>
</div>
  
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
