<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.com">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Employee List</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style type="text/css">
body {
	background: url('/bg1.jpg') no-repeat center/cover black;
	height: 100vh;
	position: relative;
	opacity: 0.9;
	color: white;
}

.container-fluid {
	background: black;
	opacity: 0.8;
}

#logo {
	height: 50px;
	width: 50px
}
a{
    text-decoration: none;
    color: white;
    }
    i{
    font-size: 24px;
    padding: 0px;   
    }
</style>
</head>
<body>

	<div class="container-fluid">
		<table class="table table-hover my-5">
			<thead class="table-primary my-3">
				<tr>
					<th scope="col">Id</th>
					<th scope="col">Employee Name</th>
					<th scope="col">DOB</th>
					<th scope="col">Gender</th>
					<th scope="col">Department</th>
					<th scope="col">Location</th>
					<th scope="col">joiningDate</th>
					<th scope="col">Email</th>
					<th scope="col">primaryNum</th>
					<th scope="col">Contact Address</th>
				</tr>
			</thead>
			<tbody class="table-dark table-group-divider">
				<tr th:each="list:${employee}">
					<td th:text="${list.id}"></td>
					<td th:text="${list.firstName} +' '+ ${list.lastName}"></td>
					<td th:text="${list.dob}"></td>
					<td th:text="${list.gender}"></td>
					<td th:text="${list.department}"></td>
					<td th:text="${list.location}"></td>
					<td th:text="${list.joiningDate}"></td>
					<td th:text="${list.email}"></td>
					<td th:text="${list.primaryNum}"></td>
					<td th:text="${list.contactAdd}"></td>
				</tr>
			</tbody>
		</table>
		<div class="d-grid gap-2 col-6 mx-auto">
		  <button class="btn btn-outline-info" type="button"><a href="home"><i class="bi bi-house-add-fill" ></i>&nbsp;  Home</a></button>
	</div>
	</div>
</body>
</html>
